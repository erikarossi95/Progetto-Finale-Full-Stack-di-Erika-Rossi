# Deploy del frontend (Vue SPA) su Netlify.
# Il backend PHP+MySQL va ospitato altrove; imposta VITE_API_BASE_URL
# come variabile d'ambiente Netlify, puntando all'URL del backend (es. https://api.tuodominio.it/api).
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Le rotte SPA (es. /e/:slug, /dashboard) devono servire index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
